name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: frontend-web
        run: |
          npm ci
      - name: Run frontend tests
        working-directory: frontend-web
        run: |
          npm test

  ingest-dryrun:
    runs-on: ubuntu-latest
    needs: frontend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install minimal Python deps for ingestion
        run: |
          python -m pip install --upgrade pip
          pip install Pillow
      - name: Dry-run ingestion script
        run: |
          python scripts/ingest_feedback.py --metadata datasets/feedback_metadata.jsonl --dry-run
