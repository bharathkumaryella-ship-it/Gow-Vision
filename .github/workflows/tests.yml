name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r doc/requirements-ci.txt
        pip install pytest pytest-cov pytest-mock pytest-flask
      env:
        CI: 'true'
    
    - name: List installed packages
      run: pip list | grep -E "pytest|flask|torch" || true
    
    - name: Run Backend Tests
      run: |
        cd backend
        python -m pytest tests/ -v --tb=short

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps 2>&1
        npm list 2>&1 | head -20 || true
    
    - name: Run linting
      continue-on-error: true
      run: |
        cd frontend
        npm run lint 2>&1 || true
    
    - name: Run Frontend Tests
      continue-on-error: true
      run: |
        cd frontend
        npm run test:run 2>&1 || true
    
    - name: Build Frontend
      run: |
        cd frontend
        npm run build 2>&1

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    
    steps:
    - name: Report results
      run: |
        echo "=== Test Results ==="
        echo "Backend:  ${{ needs.backend-tests.result }}"
        echo "Frontend: ${{ needs.frontend-tests.result }}"
        
        if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
          echo "❌ Backend tests failed"
          exit 1
        fi
        
        if [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
          echo "❌ Frontend tests/build failed"
          exit 1
        fi
        
        echo "✓ All tests passed"
