name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  backend-tests:
    name: Backend Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r doc/requirements-ci.txt
          pip install pytest pytest-cov pytest-mock pytest-flask
        env:
          CI: 'true'

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ --tb=short -v

  frontend-tests:
    name: Frontend Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Run lint checks
        continue-on-error: true
        run: |
          cd frontend
          npm run lint || true

      - name: Run tests
        continue-on-error: true
        run: |
          cd frontend
          npm run test:run || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Check documentation
        run: |
          echo "Checking for required documentation files..."
          test -f "doc/COMPLETE_DOCUMENTATION.md" && echo "✓ API Documentation found" || echo "⚠ Missing API Documentation"
          test -f "doc/README.md" && echo "✓ README found" || echo "⚠ Missing README"

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Check critical tests
        run: |
          echo "CI/CD Status Summary"
          echo "===================="
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
          
          if [[ "${{ needs.backend-tests.result }}" == "failure" || "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "::error::Critical checks failed!"
            exit 1
          fi
          echo "✓ All critical checks passed!"
